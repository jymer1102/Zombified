<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Horror Zombie Shooter</title>
    <style>
      body {
        margin: 0;
        background-color: #111;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #game-container {
        width: 960px;
        height: 600px;
        border: 2px solid #8B0000;
        background: #000;
        box-shadow: 0 0 20px rgba(139, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-msg {
        color: #ff3333;
        text-align: center;
        padding: 20px;
      }
    </style>
  </head>
  <body>

    <h1>Horror Zombie Shooter</h1>
    
    <div id="game-container">
      <div class="error-msg">
        <h3>Unity WebGL Engine Framework Missing</h3>
        <p>This HTML container is live! To play the actual game, compile your C# code to WebGL inside the Unity Editor and upload the generated <b>Build</b> folder assets to this repository.</p>
      </div>
    </div>

  </body>
</html>
